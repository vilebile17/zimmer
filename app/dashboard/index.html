<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1"
                />
                <title>Your Dashboard</title>
                <link
                        rel="stylesheet"
                        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
                />
                <link href="/default.css" rel="stylesheet" />
                <link href="/dashboard/styles.css" rel="stylesheet" />
                <script src="/set_theme.js"></script>
        </head>
        <header>
                <h3 id="navbar-logo">Zimmer</h3>
                <select id="theme-switcher">
                        Test selection
                        <option value="mocha">CTP Mocha</option>
                        <option value="latte">CTP Latte</option>
                        <option value="gruvbox-dark">Gruvbox Dark</option>
                        <option value="gruvbox-light">Gruvbox Light</option>
                        <option value="nord">Nord</option>
                        <option value="sapphire">Sapphire</option>
                        <option value="hacker">Hacker</option>
                        <option value="grape">Grape</option>
                </select>
        </header>
        <body>
                <div class="user-card card">
                        <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="240"
                                height="240"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="icon icon-tabler icons-tabler-outline icon-tabler-user"
                        >
                                <path
                                        stroke="none"
                                        d="M0 0h24v24H0z"
                                        fill="none"
                                />
                                <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" />
                                <path
                                        d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"
                                />
                        </svg>
                        <div class="user-info">
                                <p>
                                        name:
                                        <b id="username">User</b>
                                </p>
                                <p>
                                        number of classes:
                                        <b id="numClasses">0</b>
                                </p>
                                <p>
                                        assignments to do:
                                        <b id="numAssignments">0</b>
                                </p>
                        </div>
                </div>
                <div class="snackbar" id="snackbar-success">joined class!</div>
                <div class="snackbar" id="snackbar-danger">
                        couldn't join class :(
                </div>
                <div id="class-buttons">
                        <button id="join-class-button">Join Class</button>
                        <button id="create-class-button">Create Class</button>
                </div>

                <div id="join-class-modal" class="modal">
                        <div class="modal-content">
                                <div class="modal-header">
                                        <span class="close" id="join-close"
                                                >&times;</span
                                        >
                                        <h2>Join a Class</h2>
                                </div>
                                <div class="modal-body">
                                        <p>
                                                Enter the class ID, your teacher
                                                should provide this to you
                                        </p>
                                        <input
                                                id="class-id"
                                                placeholder="classID"
                                        />
                                </div>
                                <div class="modal-footer">
                                        <button id="join">Join</button>
                                </div>
                        </div>
                </div>
                <div id="create-class-modal" class="modal">
                        <div class="modal-content">
                                <div class="modal-header">
                                        <span class="close" id="create-close"
                                                >&times;</span
                                        >
                                        <h2>Create a Class</h2>
                                </div>
                                <div class="modal-body">
                                        <p>Enter the class name</p>
                                        <input
                                                id="class-name"
                                                placeholder="className"
                                        />
                                </div>
                                <div class="modal-footer">
                                        <button id="create">Create</button>
                                </div>
                        </div>
                </div>

                <p id="logout-text">
                        Not you? click <a id="logout-button">here</a> to log out
                </p>
        </body>
        <script src="/universal_actions.js" type="module"></script>
        <script src="/dashboard/dashboard.js" type="module"></script>
</html>
