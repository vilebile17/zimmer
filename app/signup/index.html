<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1"
                />
                <title>Zimmer Sign-Up</title>
                <link
                        rel="stylesheet"
                        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
                />
                <link href="/default.css" rel="stylesheet" />
                <link href="/signup/styles.css" rel="stylesheet" />
                <script src="/set_theme.js"></script>
        </head>
        <header>
                <h3 id="navbar-logo">Zimmer</h3>
                <select id="theme-switcher">
                        Test selection
                        <option value="mocha">CTP Mocha</option>
                        <option value="latte">CTP Latte</option>
                        <option value="gruvbox-dark">Gruvbox Dark</option>
                        <option value="gruvbox-light">Gruvbox Light</option>
                        <option value="nord">Nord</option>
                        <option value="sapphire">Sapphire</option>
                        <option value="hacker">Hacker</option>
                        <option value="grape">Grape</option>
                </select>
        </header>

        <body>
                <div class="card signup-card">
                        <h2>Sign Up</h2>
                        <div>
                                <input
                                        type="email"
                                        class="input"
                                        id="email"
                                        size="20"
                                        name="email"
                                        placeholder="Email"
                                />
                        </div>
                        <div>
                                <input
                                        type="text"
                                        class="input"
                                        id="name"
                                        size="20"
                                        name="name"
                                        placeholder="Name"
                                />
                        </div>
                        <div>
                                <input
                                        type="password"
                                        class="input"
                                        id="password"
                                        minlength="8"
                                        size="20"
                                        name="password"
                                        placeholder="Password"
                                />
                        </div>
                        <div>
                                <input
                                        type="password"
                                        class="input"
                                        id="confirm-password"
                                        minlength="8"
                                        size="20"
                                        name="password"
                                        placeholder="Confirm Password"
                                />
                        </div>
                        <div>
                                <button type="button" id="signup-button">
                                        Sign Up
                                </button>
                        </div>
                </div>
                <script src="./signup.js" type="module"></script>
        </body>
        <div class="snackbar" id="snackbar-warning">!</div>
        <div class="snackbar" id="snackbar-danger">couldn't join class :(</div>
        <script src="/universal_actions.js" type="module"></script>
</html>
