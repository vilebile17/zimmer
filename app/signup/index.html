<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1"
                />
                <title>Zimmer Sign-Up</title>
                <link
                        rel="stylesheet"
                        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
                />
                <link href="/default.css" rel="stylesheet" />
                <link href="/signup/styles.css" rel="stylesheet" />
                <script>
                        function toggleTheme() {
                                document.body.classList.toggle("light");
                        }
                </script>
        </head>
        <header>
                <h3>Zimmer</h3>
                <button
                        type="button"
                        id="theme-switcher"
                        onclick="toggleTheme()"
                >
                        <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="icon icon-tabler icons-tabler-outline icon-tabler-sun"
                        >
                                <path
                                        stroke="none"
                                        d="M0 0h24v24H0z"
                                        fill="none"
                                />
                                <path d="M8 12a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" />
                                <path
                                        d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"
                                />
                        </svg>
                </button>
        </header>

        <body>
                <div class="card signup-card">
                        <h2>Sign Up</h2>
                        <div>
                                <input
                                        type="email"
                                        class="input"
                                        id="email"
                                        size="20"
                                        name="email"
                                        placeholder="Email"
                                />
                        </div>
                        <div>
                                <input
                                        type="text"
                                        class="input"
                                        id="name"
                                        size="20"
                                        name="name"
                                        placeholder="Name"
                                />
                        </div>
                        <div>
                                <input
                                        type="password"
                                        class="input"
                                        id="password"
                                        minlength="8"
                                        size="20"
                                        name="password"
                                        placeholder="Password"
                                />
                        </div>
                        <div>
                                <input
                                        type="password"
                                        class="input"
                                        id="confirm-password"
                                        minlength="8"
                                        size="20"
                                        name="password"
                                        placeholder="Confirm Password"
                                />
                        </div>
                        <div>
                                <button type="button" id="signup-button">
                                        Sign Up
                                </button>
                        </div>
                </div>
                <script src="./signup.js" type="module"></script>
        </body>
        <div id="snackbar">login failed</div>
</html>
