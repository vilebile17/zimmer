<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1"
                />
                <title>{{.Username}}'s profile</title>
                <link
                        rel="stylesheet"
                        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
                />
                <link href="/default.css" rel="stylesheet" />
                <link href="/styles.css" rel="stylesheet" />
                <script src="/set_theme.js"></script>
                <script>
                        function login() {
                                window.location.replace("/login");
                                window.location.href = "/login";
                        }
                        function signup() {
                                window.location.replace("/signup");
                                window.location.href = "/signup";
                        }
                </script>
        </head>
        <header>
                <h3 id="navbar-logo">Zimmer</h3>
                <select id="theme-switcher">
                        Test selection
                        <option value="mocha">CTP Mocha</option>
                        <option value="latte">CTP Latte</option>
                        <option value="gruvbox-dark">Gruvbox Dark</option>
                        <option value="gruvbox-light">Gruvbox Light</option>
                        <option value="nord">Nord</option>
                        <option value="lilac">Lilac</option>
                        <option value="sapphire">Sapphire</option>
                        <option value="hacker">Hacker</option>
                </select>
        </header>
        <body>
                <div id="hero-section">
                        <h3 id="logo">Zimmer</h3>
                        <h1 id="hero-heading">
                                An LMS platform that's <br /><i
                                        >Built Different</i
                                >
                        </h1>
                        <p>
                                Zimmer is a completely open-source Learning
                                Management Software which is designed to be
                                simple, minimalistic and bloat-free;
                                <br />
                                No AI nonsense, no data tracking, just stuff
                                you'll actually use, all at your fingertips.
                        </p>
                        <div class="button-holder">
                                <button id="sign-up-button" onclick="signup()">
                                        Sign up
                                </button>
                                <button id="login-button" onclick="login()">
                                        Login
                                </button>
                        </div>
                </div>
        </body>
        <script src="/universal_actions.js" type="module"></script>
</html>
