<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1"
                />
                <title>Bester Zimmer</title>
                <link
                        rel="stylesheet"
                        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
                />
                <link href="/default.css" rel="stylesheet" />
                <link href="/assignments/styles.css" rel="stylesheet" />
                <script src="/set_theme.js"></script>
        </head>
        <header>
                <h3 id="navbar-logo">Zimmer</h3>
                <select id="theme-switcher">
                        Test selection
                        <option value="mocha">CTP Mocha</option>
                        <option value="latte">CTP Latte</option>
                        <option value="sapphire">Sapphire</option>
                </select>
        </header>
        <a class="mini-text" id="back-button" href="/c/{{.ClassID}}"
                >← Back to Class</a
        >
        <body>
                <div class="card title-card">
                        <h1>{{.Title}}</h1>
                        <p class="mini-text" id="id">ID: {{.ID}}</p>
                </div>
                <div class="card">
                        <h3>Instructions</h3>
                        <p>{{.Instructions}}</p>
                </div>
                <div class="card submission-card">
                        <h3>Your Work</h3>
                        <textarea
                                id="student-work"
                                name="student-work"
                                rows="7"
                        ></textarea>
                        <div>
                                <button type="button" id="hand-in-button">
                                        Hand In
                                </button>
                        </div>
                </div>
        </body>
        <div id="snackbar">login failed</div>
        <script src="/universal_actions.js" type="module"></script>
        <script src="/assignments/assignments.js" type="module"></script>
</html>
