<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1"
                />
                <title>Zimmer Assignment</title>
                <link
                        rel="stylesheet"
                        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
                />
                <link href="/default.css" rel="stylesheet" />
                <link href="/assignments/styles.css" rel="stylesheet" />
                <script src="/set_theme.js"></script>
        </head>
        <header>
                <h3 id="navbar-logo">Zimmer</h3>
                <select id="theme-switcher">
                        Test selection
                        <option value="mocha">CTP Mocha</option>
                        <option value="latte">CTP Latte</option>
                        <option value="gruvbox-dark">Gruvbox Dark</option>
                        <option value="gruvbox-light">Gruvbox Light</option>
                        <option value="nord">Nord</option>
                        <option value="lilac">Lilac</option>
                        <option value="sapphire">Sapphire</option>
                        <option value="hacker">Hacker</option>
                        <option value="no-colours">🖕 css</option>
                </select>
        </header>
        <a class="mini-text" id="back-button" href="/c/{{.ClassID}}">
                ← Back to Class
        </a>
        <body>
                <div class="card" id="title-card">
                        <h1>{{.Title}}</h1>
                        <p class="mini-text" id="id">ID: {{.ID}}</p>
                        <p class="mini-text">{{.DueAt}}</p>
                </div>
                <div class="card">
                        <h3>Instructions</h3>
                        <p>{{.Instructions}}</p>
                </div>
                <div class="card" id="submission-card">
                        <div class="submission-header">
                                <h3>Your Work</h3>
                                <span id="status" class="mini-text"
                                        >assigned</span
                                >
                        </div>
                        <textarea
                                id="student-work"
                                name="student-work"
                                rows="7"
                        ></textarea>
                        <div>
                                <button type="button" id="hand-in-button">
                                        Hand In
                                </button>
                        </div>
                </div>
                <div id="delete-holder">
                        <button class="danger-button" id="delete-button">
                                <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="18"
                                        height="18"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="icon icon-tabler icons-tabler-outline icon-tabler-trash"
                                >
                                        <path
                                                stroke="none"
                                                d="M0 0h24v24H0z"
                                                fill="none"
                                        />
                                        <path d="M4 7l16 0" />
                                        <path d="M10 11l0 6" />
                                        <path d="M14 11l0 6" />
                                        <path
                                                d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"
                                        />
                                        <path
                                                d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"
                                        />
                                </svg>
                        </button>
                </div>
        </body>
        <div class="snackbar" id="snackbar-success">joined class!</div>
        <div class="snackbar" id="snackbar-danger">couldn't join class :(</div>
        <script src="/universal_actions.js" type="module"></script>
        <script src="/assignments/assignments.js" type="module"></script>
</html>
