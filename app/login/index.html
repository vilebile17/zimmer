<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1"
                />
                <title>Zimmer Login</title>
                <link
                        rel="stylesheet"
                        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
                />
                <link href="/default.css" rel="stylesheet" />
                <link href="/login/styles.css" rel="stylesheet" />
                <script src="/set_theme.js"></script>
        </head>
        <header>
                <h3 id="navbar-logo">Zimmer</h3>
                <select id="theme-switcher">
                        Test selection
                        <option value="mocha">CTP Mocha</option>
                        <option value="latte">CTP Latte</option>
                        <option value="gruvbox-dark">Gruvbox Dark</option>
                        <option value="gruvbox-light">Gruvbox Light</option>
                        <option value="nord">Nord</option>
                        <option value="lilac">Lilac</option>
                        <option value="sapphire">Sapphire</option>
                        <option value="hacker">Hacker</option>
                        <option value="no-colours">🖕 css</option>
                </select>
        </header>

        <body>
                <div class="card login-card">
                        <h2>Login</h2>
                        <div>
                                <input
                                        type="email"
                                        class="input"
                                        id="email"
                                        size="20"
                                        name="email"
                                        placeholder="Email"
                                />
                        </div>
                        <div>
                                <input
                                        type="password"
                                        class="input"
                                        id="password"
                                        minlength="8"
                                        size="20"
                                        name="password"
                                        placeholder="Password"
                                />
                        </div>
                        <div>
                                <button type="button" id="login-button">
                                        Login
                                </button>
                        </div>
                        <div>
                                <p class="mini-text">
                                        Not got an account? Click
                                        <a href="/signup">here</a> to make one
                                </p>
                        </div>
                </div>
                <script src="./login.js" type="module"></script>
        </body>
        <div class="snackbar" id="snackbar-warning">!</div>
        <div class="snackbar" id="snackbar-danger">couldn't join class :(</div>
        <script src="/universal_actions.js" type="module"></script>
</html>
