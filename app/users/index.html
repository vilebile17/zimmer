<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1"
                />
                <title>{{.Username}}'s profile</title>
                <link
                        rel="stylesheet"
                        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
                />
                <link href="/default.css" rel="stylesheet" />
                <link href="/users/styles.css" rel="stylesheet" />
                <script src="/set_theme.js"></script>
        </head>
        <header>
                <h3 id="navbar-logo">Zimmer</h3>
                <select id="theme-switcher">
                        Test selection
                        <option value="mocha">CTP Mocha</option>
                        <option value="latte">CTP Latte</option>
                        <option value="gruvbox-dark">Gruvbox Dark</option>
                        <option value="gruvbox-light">Gruvbox Light</option>
                        <option value="nord">Nord</option>
                        <option value="lilac">Lilac</option>
                        <option value="sapphire">Sapphire</option>
                        <option value="hacker">Hacker</option>
                        <option value="no-colours">🖕 css</option>
                </select>
        </header>
        <body>
                <div class="user-card card">
                        <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="240"
                                height="240"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="icon icon-tabler icons-tabler-outline icon-tabler-user"
                        >
                                <path
                                        stroke="none"
                                        d="M0 0h24v24H0z"
                                        fill="none"
                                />
                                <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" />
                                <path
                                        d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"
                                />
                        </svg>
                        <div id="user-info">
                                <h1 id="username">{{.Username}}</h1>
                                <p>joined: <b>{{.JoinedAt}}</b></p>
                                <p id="bio">{{.Bio}}</p>
                        </div>
                </div>
                <p class="mini-text" id="user-id">ID: {{.ID}}</p>
                <div id="modal" class="modal">
                        <div class="modal-content">
                                <div class="modal-header">
                                        <span class="close" id="close-modal"
                                                >&times;</span
                                        >
                                        <h2 id="modal-title">Edit Profile</h2>
                                </div>
                                <div class="modal-body">
                                        <div class="input-group">
                                                <label
                                                        for="name-input"
                                                        class="mini-text"
                                                        type="text"
                                                        name="name"
                                                        >New Name:
                                                </label>
                                                <input
                                                        id="name-input"
                                                        value="{{.Username}}"
                                                />
                                        </div>
                                        <div class="input-group">
                                                <label
                                                        for="bio-input"
                                                        class="mini-text"
                                                >
                                                        New Bio:
                                                </label>
                                                <input
                                                        type="text"
                                                        name="bio"
                                                        id="bio-input"
                                                        value="{{.Bio}}"
                                                />
                                        </div>
                                </div>
                                <div class="modal-footer">
                                        <button id="send-the-update-button">
                                                Update Profile!
                                        </button>
                                </div>
                        </div>
                </div>
        </body>
        <div class="snackbar" id="snackbar-success">Updated Successfully!</div>
        <div class="snackbar" id="snackbar-danger">Couldn't update profile</div>
        <script src="/universal_actions.js" type="module"></script>
        <script src="/users/users.js" type="module"></script>
</html>
