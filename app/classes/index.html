<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1"
                />
                <title>Bester Zimmer</title>
                <link
                        rel="stylesheet"
                        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
                />
                <link href="/default.css" rel="stylesheet" />
                <link href="/classes/styles.css" rel="stylesheet" />
                <script src="/set_theme.js"></script>
                <script>
                        function openTab(event, tabID) {
                                let tabContent =
                                        document.getElementsByClassName(
                                                "tab-content",
                                        );
                                for (let i = 0; i < tabContent.length; i++) {
                                        tabContent[i].style.display = "none";
                                }

                                let tabLinks =
                                        document.getElementsByClassName(
                                                "tab-links",
                                        );
                                for (i = 0; i < tabLinks.length; i++) {
                                        tabLinks[i].className = tabLinks[
                                                i
                                        ].className.replace(" active", "");
                                }

                                document.getElementById(tabID).style.display =
                                        "block";
                                event.currentTarget.className += " active";
                        }
                </script>
        </head>
        <header>
                <h3 id="navbar-logo">Zimmer</h3>
                <select id="theme-switcher">
                        Test selection
                        <option value="mocha">CTP Mocha</option>
                        <option value="latte">CTP Latte</option>
                        <option value="gruvbox-dark">Gruvbox Dark</option>
                        <option value="gruvbox-light">Gruvbox Light</option>
                        <option value="nord">Nord</option>
                        <option value="sapphire">Sapphire</option>
                        <option value="hacker">Hacker</option>
                        <option value="grape">Grape</option>
                </select>
        </header>
        <div id="top-info-section">
                <div class="card">
                        <h2>{{.Name}}</h2>
                        <p class="extra-info mini-text" id="class-id">
                                ID: {{.ClassID}}
                        </p>
                        <p class="extra-info mini-text">
                                Taught by
                                <a href="/u/{{.TeacherID}}">{{.TeacherName}}</a>
                        </p>
                </div>
                <!-- Tab links -->
                <div class="tab">
                        <button
                                class="tab-links"
                                onclick="openTab(event, 'assignments')"
                                id="default-tab"
                        >
                                <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="icon icon-tabler icons-tabler-outline icon-tabler-clipboard-text"
                                >
                                        <path
                                                stroke="none"
                                                d="M0 0h24v24H0z"
                                                fill="none"
                                        />
                                        <path
                                                d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"
                                        />
                                        <path
                                                d="M9 5a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2a2 2 0 0 1 -2 2h-2a2 2 0 0 1 -2 -2"
                                        />
                                        <path d="M9 12h6" />
                                        <path d="M9 16h6" />
                                </svg>
                        </button>
                        <button
                                class="tab-links"
                                onclick="openTab(event, 'resources')"
                        >
                                <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="icon icon-tabler icons-tabler-outline icon-tabler-books"
                                >
                                        <path
                                                stroke="none"
                                                d="M0 0h24v24H0z"
                                                fill="none"
                                        />
                                        <path
                                                d="M5 5a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v14a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1l0 -14"
                                        />
                                        <path
                                                d="M9 5a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v14a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1l0 -14"
                                        />
                                        <path d="M5 8h4" />
                                        <path d="M9 16h4" />
                                        <path
                                                d="M13.803 4.56l2.184 -.53c.562 -.135 1.133 .19 1.282 .732l3.695 13.418a1.02 1.02 0 0 1 -.634 1.219l-.133 .041l-2.184 .53c-.562 .135 -1.133 -.19 -1.282 -.732l-3.695 -13.418a1.02 1.02 0 0 1 .634 -1.219l.133 -.041"
                                        />
                                        <path d="M14 9l4 -1" />
                                        <path d="M16 16l3.923 -.98" />
                                </svg>
                        </button>
                        <button
                                class="tab-links"
                                onclick="openTab(event, 'announcements')"
                        >
                                <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="icon icon-tabler icons-tabler-outline icon-tabler-message"
                                >
                                        <path
                                                stroke="none"
                                                d="M0 0h24v24H0z"
                                                fill="none"
                                        />
                                        <path d="M8 9h8" />
                                        <path d="M8 13h6" />
                                        <path
                                                d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12"
                                        />
                                </svg>
                        </button>
                        <button
                                class="tab-links"
                                onclick="openTab(event, 'students')"
                        >
                                <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="icon icon-tabler icons-tabler-outline icon-tabler-users"
                                >
                                        <path
                                                stroke="none"
                                                d="M0 0h24v24H0z"
                                                fill="none"
                                        />
                                        <path
                                                d="M5 7a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"
                                        />
                                        <path
                                                d="M3 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"
                                        />
                                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                                        <path
                                                d="M21 21v-2a4 4 0 0 0 -3 -3.85"
                                        />
                                </svg>
                        </button>
                </div>
        </div>
        <div class="card tab-content" id="announcements">
                <ul>
                        <p class="card-heading">No annoucements yet...</p>
                </ul>
        </div>
        <div id="resources-modal" class="modal">
                <div class="modal-content">
                        <div class="modal-header">
                                <span class="close" id="resources-close"
                                        >&times;</span
                                >
                                <h2 id="resource-title">Resource Title</h2>
                        </div>
                        <div class="modal-body">
                                <p id="resource-content">Resource Content</p>
                        </div>
                </div>
        </div>
        <div class="snackbar" id="snackbar-success">joined class!</div>
        <div class="snackbar" id="snackbar-warning">
        <script src="/universal_actions.js" type="module"></script>
        <script src="/classes/classes.js" type="module"></script>
</html>
